<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Pro v5.3 - Firebase Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- BƯỚC 1: DÁN CONFIG CỦA BẠN VÀO ĐÂY ---
        const firebaseConfig = {
            apiKey: "AIzaSyDlSSw_HYlplR7cE2yJm4LPKCqjQGfs_08",
            authDomain: "photobooth-management-2cbd1.firebaseapp.com",
            projectId: "photobooth-management-2cbd1",
            storageBucket: "photobooth-management-2cbd1.appspot.com",
            messagingSenderId: "980854296268",
            appId: "1:980854296268:web:a595e1184d7e378c983c69"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- QUY TẮC FIREBASE RULES (Dán cái này vào tab Rules trên Firebase Console) ---
        /*
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /{document=**} {
              allow read, write: if true;
            }
          }
        }
        */

        // Xuất ra window để các hàm HTML gọi được
        window.db = db;
        console.log("Firebase đã khởi tạo!");
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .loading-overlay { background: rgba(255,255,255,0.9); position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <!-- Màn hình chờ kết nối -->
    <div id="loading-screen" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
        <p class="text-slate-600 font-medium">Đang kết nối Cloud Firebase...</p>
        <p class="text-xs text-slate-400 mt-2">Vui lòng kiểm tra tab Rules nếu bị kẹt ở đây quá lâu</p>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <header class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📸 Photobooth Pro <span class="text-indigo-600">v5.3 Cloud</span></h1>
                <div id="connection-status" class="flex items-center gap-2 text-xs font-bold text-orange-500 mt-1">
                    <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
                    ĐANG KẾT NỐI...
                </div>
            </div>
            <button onclick="openNewEventModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-100 transition-all">
                + Sự Kiện Mới
            </button>
        </header>

        <!-- (Phần còn lại của giao diện bạn dán từ bản cũ vào đây) -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center">
            <p class="text-slate-500">Hệ thống đã sẵn sàng. Sau khi bạn chỉnh Rules trên Firebase, hãy tải lại trang.</p>
        </div>
    </div>

    <script>
        // Kiểm tra kết nối
        setTimeout(() => {
            if (window.db) {
                document.getElementById('loading-screen').classList.add('hidden');
                const status = document.getElementById('connection-status');
                status.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span> ĐÃ KẾT NỐI CLOUD';
                status.classList.replace('text-orange-500', 'text-emerald-500');
            }
        }, 2000);

        function openNewEventModal() {
            alert("Vui lòng dán nốt phần giao diện HTML của bạn vào file này để sử dụng đầy đủ tính năng!");
        }
    </script>
</body>
</html>
